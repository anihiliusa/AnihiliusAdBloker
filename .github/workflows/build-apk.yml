name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Build release APK
        run: gradle --no-daemon assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnihiliusAdBlocker-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnihiliusAdBlocker-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Publish latest APK release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-apk
          name: Latest APK Build
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          artifacts: "app/build/outputs/apk/debug/*.apk,app/build/outputs/apk/release/*.apk"
