name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK platforms and build tools
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Create .android directory and generate debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkeypair -v \
          -keystore ~/.android/debug.keystore \
          -storepass android \
          -alias androiddebugkey \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" || true

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Prepare APK files
      run: |
        mkdir -p output
        echo "=== Finding all APKs ==="
        find . -name "*.apk" -type f -print
        DEBUG_APK=$(find app/build/outputs/apk -name "*debug*.apk" -type f | head -n 1)
        RELEASE_APK=$(find app/build/outputs/apk -name "*release*.apk" -type f | head -n 1)
        echo "Debug APK: $DEBUG_APK"
        echo "Release APK: $RELEASE_APK"
        test -n "$DEBUG_APK"
        cp "$DEBUG_APK" output/AnihiliusAdBlocker-debug.apk
        if [ -n "$RELEASE_APK" ]; then cp "$RELEASE_APK" output/AnihiliusAdBlocker-release.apk; fi
        ls -lh output

    - name: Upload APK files
      uses: actions/upload-artifact@v4
      with:
        name: AnihiliusAdBlocker-APK
        path: output/
        if-no-files-found: error
        retention-days: 90

    - name: Create GitHub Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: output/*.apk
        generate_release_notes: true
        fail_on_unmatched_files: false
