name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK platforms and build tools
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Generate debug keystore
      run: |
        keytool -genkeypair -v \
          -keystore ~/.android/debug.keystore \
          -storepass android \
          -alias androiddebugkey \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" || true

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: List APK files
      run: |
        echo "=== Finding all APKs ==="
        find . -name "*.apk" -type f 2>&1
        echo "=== app/build/outputs ==="
        find app/build/outputs -type f 2>&1 || echo "outputs dir not found"

    - name: Upload Debug APK (artifact)
      uses: actions/upload-artifact@v4
      with:
        name: AnihiliusAdBlocker-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 90

    - name: Upload Release APK (artifact)
      uses: actions/upload-artifact@v4
      with:
        name: AnihiliusAdBlocker-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
        retention-days: 90

    - name: Create GitHub Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
        fail_on_unmatched_files: false
