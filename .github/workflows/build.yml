name: Build Xtube APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
      - name: Test project
        run: gradle :app:tasks --no-daemon --stacktrace
      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace
      - name: Save APK in repository folder
        run: |
          mkdir -p apk output
          DEBUG_APK=$(find app/build/outputs/apk -name "*debug*.apk" -type f | head -n 1)
          test -n "$DEBUG_APK"
          cp "$DEBUG_APK" apk/Xtube-v1.1.2-debug.apk
          cp "$DEBUG_APK" output/Xtube-v1.1.2-debug.apk
          ls -lh apk output
      - uses: actions/upload-artifact@v4
        with:
          name: Xtube-v1.1.2-APK
          path: output/Xtube-v1.1.2-debug.apk
          if-no-files-found: error
      - name: Commit APK back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f apk/Xtube-v1.1.2-debug.apk
          git commit -m "Add built Xtube v1.1.2 APK [skip ci]" || echo "No APK changes"
          git push
