name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK platforms and build tools
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Find APK files
      run: find app/build/outputs -name "*.apk" -type f 2>&1 || echo "No APK found, listing build/outputs:"
      continue-on-error: true

    - name: Debug build outputs
      run: |
        echo "=== Directory listing ==="
        find app/build/outputs -type f 2>&1 || echo "build/outputs not found"
        echo "=== Gradle tasks ==="
        ./gradlew tasks --all 2>&1 | grep -i apk || echo "No APK tasks found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AnihiliusAdBlocker-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 90

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: AnihiliusAdBlocker-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 90

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
