name: Build Xtube APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
      - run: gradle projects --no-daemon --stacktrace
      - run: gradle :app:assembleDebug --no-daemon --stacktrace
      - run: |
          mkdir -p output
          find . -name "*.apk" -type f -print
          DEBUG_APK=$(find . -name "*debug*.apk" -type f | head -n 1)
          test -n "$DEBUG_APK"
          cp "$DEBUG_APK" output/Xtube-v1.1.2-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Xtube-v1.1.2-APK
          path: output/Xtube-v1.1.2-debug.apk
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.2
          name: Xtube v1.1.2
          draft: false
          prerelease: true
          files: output/Xtube-v1.1.2-debug.apk
          fail_on_unmatched_files: true
