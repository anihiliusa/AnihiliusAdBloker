name: Build Xtube 1.3.1

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
      - name: Bundle uBlock Origin XPI
        run: |
          set -e
          mkdir -p app/src/isolated/assets/extensions
          curl -fL -o app/src/isolated/assets/extensions/ublock_origin.xpi https://github.com/gorhill/uBlock/releases/download/1.71.1b0/uBlock0_1.71.1b0.firefox.signed.xpi
          test -s app/src/isolated/assets/extensions/ublock_origin.xpi
          echo "uBlock Origin XPI bundled from gorhill/uBlock release 1.71.1b0" > app/src/isolated/assets/extensions/ublock_origin_source.txt
      - name: Check project
        run: gradle :app:tasks --no-daemon --stacktrace
      - name: Assemble debug
        run: |
          mkdir -p output
          set +e
          gradle :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee output/assemble-debug.log
          code=${PIPESTATUS[0]}
          echo "assemble_exit_code=$code" | tee output/assemble-status.txt
          exit $code
      - name: Save file
        if: success()
        run: |
          mkdir -p apk output
          FILE=$(find app/build/outputs/apk -name "*debug*.apk" -type f | head -n 1)
          test -n "$FILE"
          cp "$FILE" apk/Xtube-v1.3.1-debug.apk
          cp "$FILE" output/Xtube-v1.3.1-debug.apk
          ls -lh apk output
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Xtube-v1.3.1-build-output
          path: output/
          if-no-files-found: warn
      - name: Commit file
        if: success()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f apk/Xtube-v1.3.1-debug.apk app/src/isolated/assets/extensions/ublock_origin.xpi app/src/isolated/assets/extensions/ublock_origin_source.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add Xtube 1.3.1 debug APK [skip ci]"
          git pull --rebase origin main || true
          git push || echo "Push failed, but APK artifact is already uploaded"
